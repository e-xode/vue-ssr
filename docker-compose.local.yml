services:
  node:
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - MONGO_HOST=mongo
      - MONGO_TYPE=mongodb
  mongo:
    container_name: e-xode-mongo-vue-ssr
    build:
      context: 'docker/dev/mongo'
    env_file:
      - ./.env
    environment:
      - MONGO_INITDB_DATABASE=${MONGO_DB}
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PWD}
    volumes:
      - ./docker/dev/mongo/init-scripts:/docker-entrypoint-initdb.d
      - ./src/json:/json
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/${MONGO_DB} --quiet
      interval: 10s
      timeout: 10s
      retries: 10
    ports:
      - 27017:27017
    networks:
      - e-xode
networks:
  e-xode:
    driver: bridge
    external: true
